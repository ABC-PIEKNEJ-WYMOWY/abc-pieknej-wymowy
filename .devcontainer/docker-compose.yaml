services:
  template-of-sveltekit-application:
    build:
      args:
        DEBIAN__DOCKER_IMAGE__TAG__DATE: "20251208"
      context: "."
      dockerfile: "Dockerfile"
    environment: {}
    volumes:
      - consistency: "consistent"
        read_only: false
        source: ".."
        target: "/home/developer/template-of-sveltekit-application"
        type: "bind"
      - consistency: "consistent"
        read_only: false
        source: "./.bashrc"
        target: "/home/developer/.bashrc"
        type: "bind"
